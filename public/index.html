<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Our Calendar</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#21281F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Our Calendar">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F7F4; --card:#FFFFFF; --ink:#21281F; --muted:#6B7265;
  --line:#E1E4DC; --danger:#A33B2E;
  --p1:#2F6D62; --p2:#C0702A; /* replaced at runtime by parent colors */
  --radius:10px;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:'Public Sans',system-ui,sans-serif; background:var(--paper); color:var(--ink);
  font-size:15px; line-height:1.45;
}
button{font:inherit; cursor:pointer}
input,select,textarea{font:inherit; color:var(--ink)}
.display{font-family:'Bricolage Grotesque',sans-serif}

/* ---------- shared bits ---------- */
.btn{
  border:1px solid var(--line); background:var(--card); color:var(--ink);
  padding:7px 14px; border-radius:8px; font-weight:600; font-size:14px;
}
.btn:hover{border-color:var(--ink)}
.btn:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
  outline:2px solid var(--ink); outline-offset:1px;
}
.btn.primary{background:var(--ink); color:var(--paper); border-color:var(--ink)}
.btn.primary:hover{opacity:.88}
.btn.danger{color:var(--danger); border-color:var(--danger)}
.btn.small{padding:4px 10px; font-size:13px}
.field{display:flex; flex-direction:column; gap:4px; margin-bottom:12px}
.field label{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted)}
.field input,.field select,.field textarea{
  border:1px solid var(--line); border-radius:8px; padding:8px 10px; background:#fff;
}
.err{color:var(--danger); font-size:13px; min-height:18px; margin-top:6px}

/* ---------- auth screens ---------- */
.gate{min-height:100%; display:flex; align-items:center; justify-content:center; padding:24px}
.gate-card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:28px; width:100%; max-width:520px}
.gate h1{font-size:30px; margin-bottom:4px}
.gate .sub{color:var(--muted); margin-bottom:22px}
.parent-setup{display:grid; grid-template-columns:1fr 1fr; gap:16px}
@media(max-width:540px){.parent-setup{grid-template-columns:1fr}}
.parent-box{border:1px solid var(--line); border-radius:10px; padding:14px}
.parent-box h3{font-size:14px; margin-bottom:10px; display:flex; align-items:center; gap:8px}
.swatches{display:flex; gap:8px; flex-wrap:wrap}
.swatch{width:26px; height:26px; border-radius:50%; border:2px solid transparent; padding:0}
.swatch.sel{border-color:var(--ink)}
.login-choice{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px}
.login-parent{
  border:1px solid var(--line); border-radius:10px; background:#fff; padding:18px 10px;
  display:flex; flex-direction:column; align-items:center; gap:8px; font-weight:700;
}
.login-parent .dot{width:34px; height:34px; border-radius:50%}
.login-parent.sel{border-width:2px}

/* ---------- app shell ---------- */
header.app{
  display:flex; align-items:center; gap:10px; padding:12px 18px;
  border-bottom:1px solid var(--line); background:var(--card);
  position:sticky; top:0; z-index:20; flex-wrap:wrap;
}
.brand{font-weight:700; font-size:17px; margin-right:auto; display:flex; align-items:center; gap:10px}
.brand .who{font-size:12px; font-weight:600; color:var(--muted)}
.monthnav{display:flex; align-items:center; gap:8px}
.monthnav .month{font-size:20px; font-weight:700; min-width:190px; text-align:center}
.iconbtn{position:relative; border:1px solid var(--line); background:#fff; border-radius:8px; padding:6px 10px; font-size:15px}
.badge{
  position:absolute; top:-6px; right:-6px; background:var(--danger); color:#fff;
  font-size:11px; font-weight:700; border-radius:999px; min-width:18px; height:18px;
  display:flex; align-items:center; justify-content:center; padding:0 4px;
}
.legend{display:flex; gap:14px; padding:10px 18px 0; font-size:13px; color:var(--muted); flex-wrap:wrap}
.legend span{display:flex; align-items:center; gap:6px}
.legend i{width:12px; height:12px; border-radius:3px; display:inline-block}

/* ---------- calendar ---------- */
.cal-wrap{padding:12px 18px 32px; max-width:1100px; margin:0 auto}
.dow{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:6px}
.dow div{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); text-align:center}
.grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px}
.day{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  min-height:104px; padding:6px; text-align:left; display:flex; flex-direction:column; gap:4px;
  position:relative; transition:border-color .12s;
}
.day:hover{border-color:var(--ink)}
.day.blank{background:transparent; border-color:transparent; pointer-events:none}
.day .num{font-weight:700; font-size:14px; font-variant-numeric:tabular-nums}
.day.today .num{background:var(--ink); color:var(--paper); border-radius:6px; padding:0 6px; align-self:flex-start}
.day .who{
  position:absolute; top:6px; right:6px; font-size:11px; font-weight:700; color:#fff;
  border-radius:6px; padding:1px 6px;
}
.day .who.override{outline:2px dashed rgba(0,0,0,.35); outline-offset:1px}
.chip{
  font-size:11.5px; font-weight:600; border-radius:6px; padding:2px 6px; color:#fff;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:flex; gap:4px; align-items:center;
}
.chip .t{opacity:.85; font-weight:500}
.chip.pending{outline:2px dashed rgba(0,0,0,.4); outline-offset:-2px; opacity:.75}
.chip.bday{background:#fff; color:var(--ink); border:1px solid var(--line)}
/* Multi-day event bars: connect across cells by squaring the inner edges. */
.spanbar{
  font-size:11px; font-weight:600; color:#fff; padding:2px 6px; height:18px; line-height:14px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  margin-left:-6px; margin-right:-6px; border-radius:0;   /* bleed to cell edges = continuous look */
}
.spanbar.s-start{ margin-left:0; border-top-left-radius:6px; border-bottom-left-radius:6px }
.spanbar.s-end{ margin-right:0; border-top-right-radius:6px; border-bottom-right-radius:6px }
.spanbar.pending{ opacity:.75; background-image:repeating-linear-gradient(45deg,rgba(0,0,0,.12) 0 4px,transparent 4px 8px) }
.day.pendingswap{box-shadow:inset 0 0 0 2px #C0702A}
.swaptag{position:absolute; bottom:5px; right:6px; font-size:10px; font-weight:700;
  background:#C0702A; color:#fff; border-radius:5px; padding:1px 5px}

/* pending boxes */
.pendbox{background:#FDF3E7; border:1px solid #E8CFA8; border-radius:10px; padding:12px; margin-bottom:16px}
.pendbox.tight{margin:8px 0 0; padding:9px 10px}
.pendhead{font-weight:700; font-size:14px; color:#6A4A18; margin-bottom:4px}
.pendbody{font-size:13.5px; color:#6A4A18}
.pendmsg{font-size:13.5px; background:#fff; border-radius:7px; padding:7px 9px; margin-top:6px; color:var(--ink)}
.pendbox .actions{display:flex; gap:8px; margin-top:10px}
.appt.ispending{border-color:#E8CFA8; background:#FFFDF9}
.own.unsettled{background:#fff !important; border:1.5px dashed; font-weight:700}
.hint{font-size:13px; color:#6A4A18; background:#FDF3E7; border-radius:8px; padding:8px 10px;
  margin-bottom:12px; display:none}
.hint:not(:empty){display:block}
.req.needsme{border-color:#E8CFA8; background:#FFFDF9}
.tag{display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
  background:#F0E4CF; color:#6A4A18; border-radius:5px; padding:1px 6px; margin-top:4px}
.more{font-size:11px; color:var(--muted); font-weight:600}

/* ---------- panels ---------- */
.overlay{position:fixed; inset:0; background:rgba(30,35,28,.45); z-index:40; display:none}
.overlay.open{display:block}
.sheet{
  position:fixed; top:0; right:0; bottom:0; width:min(440px,100%); background:var(--card);
  border-left:1px solid var(--line); z-index:50; transform:translateX(102%); transition:transform .2s ease;
  display:flex; flex-direction:column;
}
.sheet.open{transform:none}
.sheet header{
  padding:16px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px;
}
.sheet header h2{font-size:18px; margin-right:auto}
.sheet .body{padding:16px 18px; overflow-y:auto; flex:1}
.x{border:none; background:none; font-size:20px; line-height:1; padding:4px 8px}

.custody-row{display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap}
.custody-tag{font-weight:700; color:#fff; border-radius:8px; padding:4px 10px; font-size:13px}

.appt{border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:10px}
.appt .top{display:flex; align-items:baseline; gap:8px}
.appt .top b{margin-right:auto}
.appt .meta{font-size:13px; color:var(--muted); margin:2px 0 8px}
.appt .own{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600;
  border-radius:6px; padding:2px 8px; color:#fff; margin-bottom:8px}
.appt .actions{display:flex; gap:8px; flex-wrap:wrap}
.swap{font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:8px}
.swap.pending{color:var(--ink)}

.req{border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:10px}
.req .head{font-weight:600; margin-bottom:2px}
.req .meta{font-size:13px; color:var(--muted); margin-bottom:8px}
.req .msg{font-size:14px; background:var(--paper); border-radius:8px; padding:8px 10px; margin-bottom:8px}
.req .actions{display:flex; gap:8px}
.req .status{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em}
.section-h{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin:18px 0 8px}
.empty{color:var(--muted); font-size:14px; padding:8px 0}

.patt{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:16px}
.patt .cell{display:flex; flex-direction:column; gap:4px; font-size:11px; font-weight:700; text-align:center; color:var(--muted)}
.patt select{border:1px solid var(--line); border-radius:6px; padding:4px 2px; font-size:12px; width:100%}
.kidrow{display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--line)}
.kidrow span{margin-right:auto}
.addkid{display:flex; gap:8px; margin-top:10px}
.addkid input{flex:1; border:1px solid var(--line); border-radius:8px; padding:7px 10px}
.check{display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer}
.check input{width:16px; height:16px; accent-color:var(--ink)}
.warn{background:#FDF3E7; border:1px solid #E8CFA8; color:#6A4A18; border-radius:8px;
  padding:10px 12px; font-size:13.5px; margin-bottom:14px}

.toast{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--paper);
  padding:9px 16px; border-radius:8px; font-size:14px; z-index:80; opacity:0; transition:opacity .2s; pointer-events:none;
}
.toast.show{opacity:1}

@media(max-width:680px){
  .day{min-height:74px; padding:4px}
  .day .who{position:static; align-self:flex-end; order:-1}
  .chip .t{display:none}
  .monthnav .month{min-width:0; font-size:16px}
  .cal-wrap{padding:10px 8px 28px}
  .legend{padding:8px 10px 0}
}
@media(prefers-reduced-motion:reduce){ .sheet{transition:none} }

/* ---------- installed-app (PWA) behaviour ---------- */
/* Respect the notch / status bar / gesture bar when running standalone. */
header.app{
  padding-top:calc(12px + env(safe-area-inset-top));
  padding-left:calc(18px + env(safe-area-inset-left));
  padding-right:calc(18px + env(safe-area-inset-right));
}
.sheet{padding-bottom:env(safe-area-inset-bottom)}
.gate{padding-top:calc(24px + env(safe-area-inset-top))}

@media(max-width:680px){
  /* Bigger tap targets — thumbs, not cursors. */
  .btn{padding:9px 15px}
  .btn.small{padding:7px 12px; font-size:13.5px}
  .iconbtn{padding:9px 12px; font-size:17px}
  .field input,.field select,.field textarea{padding:11px 12px; font-size:16px} /* 16px stops iOS zoom-on-focus */
  .day{min-height:82px}

  /* Sheets slide up from the bottom like a native panel, not in from the side. */
  .sheet{
    top:auto; left:0; right:0; bottom:0; width:100%;
    max-height:88vh; border-left:none; border-top:1px solid var(--line);
    border-radius:16px 16px 0 0; transform:translateY(102%);
  }
  .sheet.open{transform:none}
  .sheet header{
    position:relative; padding-top:20px;
    border-radius:16px 16px 0 0;
  }
  /* grab handle */
  .sheet header::before{
    content:''; position:absolute; top:7px; left:50%; transform:translateX(-50%);
    width:36px; height:4px; border-radius:2px; background:var(--line);
  }
  .sheet .body{padding-bottom:calc(20px + env(safe-area-inset-bottom))}
  .x{font-size:24px; padding:6px 10px}

  /* Header wraps to two rows on a narrow screen */
  .brand{width:100%; margin-bottom:6px}
  .monthnav{margin-right:auto}
}

/* Kill the tap-highlight flash and text selection on controls */
button, .day{ -webkit-tap-highlight-color:transparent; user-select:none }

/* Install prompt */
.install{
  position:fixed; left:12px; right:12px; bottom:calc(12px + env(safe-area-inset-bottom));
  background:var(--ink); color:var(--paper); border-radius:12px; padding:12px 14px;
  display:none; align-items:center; gap:12px; z-index:70; box-shadow:0 6px 20px rgba(0,0,0,.2);
}
.install.show{display:flex}
.install .txt{margin-right:auto; font-size:14px; line-height:1.3}
.install .txt b{display:block; font-size:15px}
.install button{border:none; border-radius:8px; padding:8px 14px; font-weight:700; font-size:14px}
.install .go{background:var(--paper); color:var(--ink)}
.install .no{background:transparent; color:var(--paper); opacity:.7; padding:8px}

/* Modal */
.modal-wrap{
  position:fixed; inset:0; background:rgba(30,35,28,.5); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; transition:opacity .15s;
}
.modal-wrap.open{opacity:1}
.modal{
  background:var(--card); border-radius:14px; padding:20px; width:100%; max-width:400px;
  transform:translateY(8px); transition:transform .15s;
}
.modal-wrap.open .modal{transform:none}
.modal h3{font-size:17px; margin-bottom:6px; font-family:'Bricolage Grotesque',sans-serif}
.modal p{font-size:14px; color:var(--muted); margin-bottom:12px}
.modal-in{
  width:100%; border:1px solid var(--line); border-radius:8px; padding:11px 12px;
  font-size:16px; margin-bottom:14px;
}
.modal-btns{display:flex; gap:8px; justify-content:flex-end}
.modal-btns .btn{padding:9px 16px}

/* Offline banner */
.offline{
  position:fixed; top:0; left:0; right:0; background:#A33B2E; color:#fff; text-align:center;
  font-size:13px; font-weight:600; padding:calc(6px + env(safe-area-inset-top)) 6px 6px;
  z-index:90; display:none;
}
.offline.show{display:block}
</style>
</head>
<body>
<div class="offline" id="offline">You're offline — showing the last view. Changes won't save until you reconnect.</div>
<div id="app"></div>
<div class="install" id="install">
  <div class="txt"><b>Add to your home screen</b>Opens like an app, no browser bar.</div>
  <button class="no" id="install-no">Not now</button>
  <button class="go" id="install-go">Install</button>
</div>
<div class="toast" id="toast"></div>
<script>
/* Global safety net: an uncaught error should never silently blank the app. */
window.addEventListener('error', e => {
  console.error('Uncaught:', e.error || e.message);
  try { toast('Something glitched \u2014 reload if it looks off'); } catch(_){}
});
window.addEventListener('unhandledrejection', e => {
  console.error('Unhandled promise rejection:', e.reason);
});
/* ============ tiny state + api ============ */
const $ = s => document.querySelector(s);
let token = localStorage.getItem('cc_token') || null;
let me = JSON.parse(localStorage.getItem('cc_me') || 'null');
let view = new Date(); view.setDate(1);
let D = null;           // last /api/data payload
let openDate = null;    // date string for open day sheet
let editingId = null;   // appointment being edited
let pollTimer = null;

async function api(path, opts = {}) {
  let res;
  try {
    res = await fetch(path, {
      method: opts.method || 'GET',
      headers: { 'Content-Type': 'application/json', ...(token ? { 'x-token': token } : {}) },
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
  } catch (e) {
    // No network — the request never left the phone, so nothing was saved.
    setOnline();
    return Promise.reject({ error: "You're offline — that didn't save. Try again once you're back on.", offline: true });
  }
  const data = await res.json().catch(() => ({}));
  if (res.status === 401 && token) { signOutLocal(); return Promise.reject(data); }
  if (!res.ok) return Promise.reject(data);
  return data;
}
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function signOutLocal(){ token=null; me=null; localStorage.removeItem('cc_token'); localStorage.removeItem('cc_me'); boot(); }

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOWS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const pad=n=>String(n).padStart(2,'0');
const monthKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}`;
const todayStr=()=>{const t=new Date();return `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;};
function fmtDate(ds){ if(!ds || !/^\d{4}-\d{2}-\d{2}$/.test(ds)) return '\u2014'; const [y,m,d]=ds.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }
function fmtTime(t){ if(!t) return ''; let [h,m]=t.split(':').map(Number); const ap=h>=12?'PM':'AM'; h=h%12||12; return `${h}:${pad(m)} ${ap}`; }

/* ============ modal (replaces prompt/confirm, which are unreliable in PWAs) ============ */
function ask({ title, body, placeholder, ok = 'Send', cancel = 'Cancel', input = true, danger = false }) {
  return new Promise(resolve => {
    const wrap = document.createElement('div');
    wrap.className = 'modal-wrap';
    wrap.innerHTML = `
      <div class="modal">
        <h3>${esc(title)}</h3>
        ${body ? `<p>${esc(body)}</p>` : ''}
        ${input ? `<input class="modal-in" placeholder="${esc(placeholder || '')}">` : ''}
        <div class="modal-btns">
          <button class="btn" data-x="0">${esc(cancel)}</button>
          <button class="btn ${danger ? 'danger' : 'primary'}" data-x="1">${esc(ok)}</button>
        </div>
      </div>`;
    document.body.appendChild(wrap);
    const field = wrap.querySelector('.modal-in');
    requestAnimationFrame(() => { wrap.classList.add('open'); field && field.focus(); });

    const done = val => { wrap.classList.remove('open'); setTimeout(() => wrap.remove(), 150); resolve(val); };
    wrap.querySelectorAll('[data-x]').forEach(b => {
      b.onclick = () => done(b.dataset.x === '1' ? (input ? (field.value.trim() || '') : true) : null);
    });
    wrap.onclick = e => { if (e.target === wrap) done(null); };
    field && field.addEventListener('keydown', e => { if (e.key === 'Enter') done(field.value.trim() || ''); });
  });
}

function parent(id){ return D?.parents.find(p=>p.id===id) || {name:'?',color:'#888'}; }
function other(){ return D.parents.find(p=>p.id!==D.me); }

/* ============ PWA: install, offline, resume ============ */
const isStandalone = () =>
  window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

// Register the service worker. This is what makes Android offer "Install app".
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      // If a new version is deployed, activate it as soon as it's ready.
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw && nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) nw.postMessage('skipWaiting');
        });
      });
    }).catch(()=>{});
    // A new SW taking over means new code — reload once so both phones stay in sync.
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloaded) return; reloaded = true; window.location.reload();
    });
  });
}

// Chrome fires this instead of showing its own banner; we show our own prompt.
let installEvent = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installEvent = e;
  if (!isStandalone() && !localStorage.getItem('cc_no_install')) {
    setTimeout(() => document.getElementById('install')?.classList.add('show'), 2500);
  }
});
window.addEventListener('DOMContentLoaded', () => {
  const box = document.getElementById('install');
  document.getElementById('install-go')?.addEventListener('click', async () => {
    box.classList.remove('show');
    if (!installEvent) return;
    installEvent.prompt();
    await installEvent.userChoice;
    installEvent = null;
  });
  document.getElementById('install-no')?.addEventListener('click', () => {
    box.classList.remove('show');
    localStorage.setItem('cc_no_install', '1');
  });
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install')?.classList.remove('show');
});

// Offline banner.
const setOnline = () => {
  document.getElementById('offline')?.classList.toggle('show', !navigator.onLine);
};
window.addEventListener('online',  () => { setOnline(); softRefresh(); });
window.addEventListener('offline', setOnline);

// Coming back to the app (unlocking the phone, switching back) must show fresh
// data straight away — not up to 25 seconds later.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') softRefresh();
});

async function softRefresh(){
  if (!token || !D || !navigator.onLine) return;
  try { await refresh(); renderApp(true); } catch(e) {}
}

function custodyFor(ds){
  const ov = D.overrides.find(o=>o.date===ds);
  const pendingSwap = (D.pending||[]).find(p=>p.kind==='swap_day'&&p.date===ds);
  if (ov) return { pid: ov.parent_id, override:true, pendingSwap };
  if (!D.schedule) return { pid:null, override:false, pendingSwap };
  const a = new Date(D.schedule.anchor_date+'T12:00:00');
  const d = new Date(ds+'T12:00:00');
  const wk = Math.floor(Math.round((d-a)/86400000)/7);
  const even = ((wk%2)+2)%2 === 0;
  const pid = even ? D.schedule.anchor_parent
                   : D.parents.find(p=>p.id!==D.schedule.anchor_parent)?.id || null;
  return { pid, override:false, pendingSwap };
}
// Items landing on a date; birthdays match month+day every year.
function itemsOn(ds){
  return D.appointments.filter(a => {
    if(!a || !a.date) return false;                 // skip corrupt rows instead of crashing
    if(a.type==='birthday') return a.date.slice(5)===ds.slice(5);
    if(a.end_date) return a.date<=ds && ds<=a.end_date;   // multi-day event spans the day
    return a.date===ds;
  });
}
function bdayAge(a, ds){
  const by=+a.date.slice(0,4), y=+ds.slice(0,4);
  return (y>by) ? (y-by) : null;
}
// The pending proposal (if any) attached to an appointment.
function pendingFor(id){ return (D.pending||[]).find(p=>p.appointment_id===id); }
// Everything waiting on ME to answer.
function myInbox(){ return (D.pending||[]).filter(p=>p.to_parent===D.me); }
function tint(hex, a){
  const n=parseInt(hex.slice(1),16), r=n>>16, g=(n>>8)&255, b=n&255;
  return `rgba(${r},${g},${b},${a})`;
}
